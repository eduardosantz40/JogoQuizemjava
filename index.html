<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>JOGO QUIZ EM JAVASCRIPT</title>
</head>
<body>
   <div class="quiz-card">

    <div class="progresso">
        <div id="barra"></div>
    </div>

    <h2 id="pergunta"></h2>

    <div class="opcoes" id="botoesOpcoes"></div>

    <button id="btnProximo" onclick="proximaPergunta()">
        Próxima Pergunta →
    </button>

</div>
        <script>
const perguntas = [
{
pergunta:"Qual seleção venceu a primeira Copa do Mundo, em 1930?",
opcoes:["Brasil","Uruguai","Argentina","Alemanha"],
resposta:1
},
{
pergunta:"Quantos títulos de Copa do Mundo o Brasil possui?",
opcoes:["3","4","5","6"],
resposta:2
},
{
pergunta:"Quem venceu a Copa do Mundo de 2022?",
opcoes:["França","Argentina","Brasil","Croácia"],
resposta:1
},
{
pergunta:"Qual país sediou a Copa de 2014?",
opcoes:["Alemanha","Brasil","Rússia","Catar"],
resposta:1
},
{
pergunta:"Qual jogador é conhecido como Rei do Futebol?",
opcoes:["Pelé","Messi","Maradona","Cristiano Ronaldo"],
resposta:0
},
{
pergunta:"Quem foi o campeão da Copa de 2018?",
opcoes:["Croácia","Alemanha","França","Argentina"],
resposta:2
},
{
pergunta:"Qual seleção tem 4 títulos mundiais?",
opcoes:["Brasil","Argentina","Itália","Uruguai"],
resposta:2
},
{
pergunta:"Onde aconteceu a Copa de 2022?",
opcoes:["Catar","Estados Unidos","Japão","China"],
resposta:0
},
{
pergunta:"Qual país venceu a Copa de 2010?",
opcoes:["Holanda","Alemanha","Espanha","Brasil"],
resposta:2
},
{
pergunta:"Quem marcou dois gols na final da Copa de 2002?",
opcoes:["Rivaldo","Ronaldinho","Ronaldo Fenômeno","Kaká"],
resposta:2
}
];

let indice=0;
let pontos=0;

const pergunta=document.getElementById("pergunta");
const opcoes=document.getElementById("botoesOpcoes");
const btn=document.getElementById("btnProximo");
const barra=document.getElementById("barra");

carregarPergunta();

function carregarPergunta(){

opcoes.innerHTML="";
btn.style.display="none";

pergunta.innerHTML=perguntas[indice].pergunta;

barra.style.width=((indice)/perguntas.length)*100+"%";

perguntas[indice].opcoes.forEach((texto,i)=>{

const botao=document.createElement("button");

botao.innerHTML=texto;

botao.onclick=()=>responder(i,botao);

opcoes.appendChild(botao);

});

}

function responder(escolha,botao){

const botoes=document.querySelectorAll("#botoesOpcoes button");

botoes.forEach(b=>b.disabled=true);

if(escolha==perguntas[indice].resposta){

botao.classList.add("correta");

pontos++;

}else{

botao.classList.add("errada");

botoes[perguntas[indice].resposta].classList.add("correta");

}

btn.style.display="block";

}

btn.onclick=()=>{

indice++;

if(indice<perguntas.length){

carregarPergunta();

}else{

mostrarResultado();

}

}

function mostrarResultado(){

let porcentagem=Math.round((pontos/perguntas.length)*100);

let mensagem="";

if(porcentagem==100){

mensagem="🏆 Perfeito! Você sabe tudo sobre Copa do Mundo.";

}else if(porcentagem>=70){

mensagem="👏 Muito bem! Você entende bastante de futebol.";

}else if(porcentagem>=50){

mensagem="🙂 Bom resultado! Continue treinando.";

}else{

mensagem="😅 Você pode melhorar. Tente novamente.";

}

document.querySelector(".quiz-card").innerHTML=`

<div class="resultado">

<h1>🏆 Quiz Finalizado!</h1>

<h2>${pontos}/${perguntas.length}</h2>

<p>${porcentagem}% de aproveitamento</p>

<br>

<h3>${mensagem}</h3>

<br><br>

<button class="reiniciar" onclick="reiniciarQuiz()">
🔄 Jogar Novamente
</button>

</div>

`;

}

function reiniciarQuiz(){

indice=0;

pontos=0;

document.querySelector(".quiz-card").innerHTML=`

<div class="progresso">

<div id="barra"></div>

</div>

<h2 id="pergunta"></h2>

<div class="opcoes" id="botoesOpcoes"></div>

<button id="btnProximo">
Próxima Pergunta →
</button>

`;

window.barra=document.getElementById("barra");
window.pergunta=document.getElementById("pergunta");
window.opcoes=document.getElementById("botoesOpcoes");
window.btn=document.getElementById("btnProximo");

btn.onclick=()=>{

indice++;

if(indice<perguntas.length){

carregarPergunta();

}else{

mostrarResultado();

}

};

carregarPergunta();

}
</script>
</body>
</html>
